name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈 태그 (예: v0.1.0). 미지정 시 현재 커밋의 태그 사용.'
        required: false

permissions:
  contents: write # GitHub Release 생성/업로드

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_pattern: 'release/*.dmg'
          - os: windows-latest
            artifact_pattern: 'release/*.exe'
          - os: ubuntu-latest
            artifact_pattern: 'release/*.AppImage'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint + typecheck + tests)
        run: npm run check && npm run typecheck && npm test

      - name: Build app (electron-vite)
        run: npm run build

      - name: Integration tests (worker pipeline)
        run: npx vitest run --config vitest.integration.config.ts

      # macOS: dmg 생성. CSC_LINK가 secrets에 있으면 서명, 없으면 ad-hoc.
      - name: Package — macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # secrets 미설정 시 자동 ID 탐색을 끄고 ad-hoc로 진행
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' && 'true' || 'false' }}
          # 공증은 별도 secrets가 모두 있을 때만. (미설정 시 electron-builder.yml의 notarize:false가 우선)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package — Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package — Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-installers
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error
          retention-days: 7

  draft-release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: List artifacts
        run: find dist-artifacts -type f | sort

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.AppImage
