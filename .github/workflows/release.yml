name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈 태그 (예: v0.1.0). 미지정 시 현재 커밋의 태그 사용.'
        required: false

permissions:
  contents: write # GitHub Release 생성/업로드

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# JavaScript actions(checkout/setup-node/cache 등)을 Node 24로 강제.
# Node 20 기반 action은 2026-09 EOL이라 deprecation 경고가 뜨므로 미리 옵트인.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# `npm run release`(scripts/release.mjs)가 로컬에서 이미 verify(lint+typecheck+
# unit+integration)를 돌렸기 때문에, 이 워크플로우는 OS별 native build와
# 패키징만 담당. 테스트 재실행 없음.
#
# 각 OS 빌드가 끝나면 그 자리에서 직접 Draft Release에 첨부. 첫 OS 호출이
# Draft를 생성하고 나머지는 같은 tag에 파일을 추가만 한다 (softprops 동작).
# 이전엔 별도 draft-release job + actions/{upload,download}-artifact를 거쳐
# 같은 dmg/exe를 두 번 전송했는데, 그 단계를 제거해 ~50% 시간/대역 절약.
jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_pattern: 'release/*.dmg'
            electron_cache: ~/Library/Caches/electron
            builder_cache: ~/Library/Caches/electron-builder
          - os: windows-latest
            artifact_pattern: 'release/*.exe'
            electron_cache: ~\AppData\Local\electron\Cache
            builder_cache: ~\AppData\Local\electron-builder\Cache
          - os: ubuntu-latest
            artifact_pattern: 'release/*.AppImage'
            electron_cache: ~/.cache/electron
            builder_cache: ~/.cache/electron-builder
    runs-on: ${{ matrix.os }}
    # 정상 ~10-15분 (electron 116MB 다운로드 + native rebuild + electron-builder).
    timeout-minutes: 25
    # secrets는 step level if에서 직접 참조 불가 — job env에서 한 번 평가해
    # 나머지 step에서 env 비교로 사용한다.
    env:
      HAS_MAC_SIGNING: ${{ secrets.MAC_CSC_LINK != '' }}
      HAS_WIN_SIGNING: ${{ secrets.WIN_CSC_LINK != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Electron binary (~116MB) + electron-builder가 받는 chrome-headless 등 캐싱.
      # release 빌드에서 가장 큰 시간 단축 (히트 시 30-60초 절약).
      - name: Cache Electron + builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.electron_cache }}
            ${{ matrix.builder_cache }}
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build app (electron-vite)
        run: npm run build

      # macOS: secrets에 인증서 있으면 서명 빌드, 없으면 ad-hoc 빌드.
      # 빈 CSC_LINK를 넘기면 electron-builder가 빈 문자열을 파일 경로로 해석하다 죽으므로
      # 두 step을 분리하고, 서명 안 할 때는 CSC_LINK 자체를 env에 넣지 않는다.
      - name: Package — macOS (signed)
        if: matrix.os == 'macos-latest' && env.HAS_MAC_SIGNING == 'true'
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # 공증은 별도 secrets가 모두 있을 때만. (미설정 시 electron-builder.yml의 notarize:false가 우선)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package — macOS (unsigned, ad-hoc)
        if: matrix.os == 'macos-latest' && env.HAS_MAC_SIGNING == 'false'
        run: npx electron-builder --mac --publish never
        env:
          # 키체인의 자동 ID 탐색 끄고 ad-hoc 서명으로 진행 (Gatekeeper 경고 발생)
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Package — Windows (signed)
        if: matrix.os == 'windows-latest' && env.HAS_WIN_SIGNING == 'true'
        run: npx electron-builder --win --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package — Windows (unsigned)
        if: matrix.os == 'windows-latest' && env.HAS_WIN_SIGNING == 'false'
        run: npx electron-builder --win --publish never

      - name: Package — Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # 빌드된 인스톨러를 그 자리에서 바로 Draft Release에 첨부.
      # 첫 호출(어느 OS든 먼저 끝난 것)이 Draft 생성, 나머지는 같은 tag에 추가.
      - name: Attach to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ matrix.artifact_pattern }}
