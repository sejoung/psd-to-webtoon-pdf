name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리즈 태그 (예: v0.1.0). 미지정 시 현재 커밋의 태그 사용.'
        required: false

permissions:
  contents: write # GitHub Release 생성/업로드

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# `npm run release`(scripts/release.mjs)가 로컬에서 이미 verify(lint+typecheck+
# unit+integration)를 돌렸기 때문에, 이 워크플로우는 OS별 native build와
# 패키징만 담당. 테스트 재실행 없음 — 빠른 릴리즈를 위해.
jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_pattern: 'release/*.dmg'
            electron_cache: ~/Library/Caches/electron
            builder_cache: ~/Library/Caches/electron-builder
          - os: windows-latest
            artifact_pattern: 'release/*.exe'
            electron_cache: ~\AppData\Local\electron\Cache
            builder_cache: ~\AppData\Local\electron-builder\Cache
          - os: ubuntu-latest
            artifact_pattern: 'release/*.AppImage'
            electron_cache: ~/.cache/electron
            builder_cache: ~/.cache/electron-builder
    runs-on: ${{ matrix.os }}
    # 정상 ~10-15분 (electron 116MB 다운로드 + native rebuild + electron-builder).
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Electron binary (~116MB) + electron-builder가 받는 chrome-headless 등 캐싱.
      # release 빌드에서 가장 큰 시간 단축 (히트 시 30-60초 절약).
      - name: Cache Electron + builder
        uses: actions/cache@v4
        with:
          path: |
            ${{ matrix.electron_cache }}
            ${{ matrix.builder_cache }}
          key: electron-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build app (electron-vite)
        run: npm run build

      # macOS: dmg 생성. CSC_LINK가 secrets에 있으면 서명, 없으면 ad-hoc.
      - name: Package — macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # secrets 미설정 시 자동 ID 탐색을 끄고 ad-hoc로 진행
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MAC_CSC_LINK != '' && 'true' || 'false' }}
          # 공증은 별도 secrets가 모두 있을 때만. (미설정 시 electron-builder.yml의 notarize:false가 우선)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package — Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Package — Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-installers
          path: ${{ matrix.artifact_pattern }}
          if-no-files-found: error
          retention-days: 7

  draft-release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest
    # 정상 ~1-2분 (artifacts 다운로드 + softprops/action-gh-release).
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: List artifacts
        run: find dist-artifacts -type f | sort

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: |
            dist-artifacts/**/*.dmg
            dist-artifacts/**/*.exe
            dist-artifacts/**/*.AppImage
