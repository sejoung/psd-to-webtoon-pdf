name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'docs/icons/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

# 동시 배포 1개만. 진행 중 새 push 오면 새 것 우선.
concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Pages가 아직 활성화 안 된 repo에서도 자동으로 켜짐 (한 번만 효력).
          # 이미 활성화된 경우엔 무시. permissions.pages: write 필요 (위에 설정됨).
          enablement: true

      # 사이트 root에서 icons에 접근할 수 있도록 docs/icons 를 _site/icons 로 복사.
      - name: Stage site
        run: |
          mkdir -p _site
          cp -r docs/site/. _site/
          cp -r docs/icons _site/icons

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
