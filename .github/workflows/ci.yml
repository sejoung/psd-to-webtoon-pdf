name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 새 커밋이 푸시되면 진행 중인 같은 브랜치의 워크플로우는 취소 (PR iteration 시 비용 절약)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# JavaScript actions(checkout/setup-node/cache 등)을 Node 24로 강제.
# Node 20 기반 action은 2026-09 EOL이라 deprecation 경고가 뜨므로 미리 옵트인.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  verify:
    name: Lint + Typecheck + Tests
    # 단일 OS에서만 — lint/typecheck/단위 테스트는 OS-independent.
    # 워커 파이프라인 통합 테스트도 ubuntu에서 한 번 검증하면 충분 (sharp/canvas는
    # 모든 OS에 prebuild 제공). OS별 native build 검증은 release 워크플로우의
    # matrix에서 자연스럽게 이뤄짐.
    runs-on: ubuntu-latest
    # 정상 ~3분 (npm ci + lint + tsc + vitest + electron-vite build + integration).
    # 1.5~2배 버퍼만 두고 hang 감지.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      # Electron binary는 npm ci postinstall에서 ~116MB 다운로드. 캐시로 0초 히트.
      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-ubuntu-${{ hashFiles('package-lock.json') }}
          restore-keys: electron-ubuntu-

      - name: Install dependencies
        run: npm ci

      - name: Lint + format check (Biome)
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (electron-vite)
        run: npm run build

      - name: Integration tests (worker pipeline)
        run: npx vitest run --config vitest.integration.config.ts
