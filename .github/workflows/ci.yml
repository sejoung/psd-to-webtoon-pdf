name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 새 커밋이 푸시되면 진행 중인 같은 브랜치의 워크플로우는 취소 (PR iteration 시 비용 절약)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint + Typecheck + Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint + format check (Biome)
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (electron-vite)
        run: npm run build

      - name: Integration tests (worker pipeline)
        run: npx vitest run --config vitest.integration.config.ts

  package-smoke:
    name: Package smoke (${{ matrix.os }})
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # 서명/공증 없이 .app 디렉터리만 생성해 패키징 파이프라인 자체가 깨지지 않는지만 확인.
      # 실제 dmg/exe 생성과 서명은 릴리스 워크플로우에서.
      - name: electron-builder --dir
        run: npm run package:dir
        env:
          # 패키징 시 자동 코드 서명 시도를 막아 시간/실패 회피
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
